<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4ustraiders — Forex Trading Suite</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23dc2626'/%3E%3Ctext x='50' y='68' font-size='55' font-weight='900' fill='white' text-anchor='middle' font-family='Arial'%3E4%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --bg-input: #1a1a1a;
            --border: #2a2a2a;
            --text: #f5f5f5;
            --text-muted: #888888;
            --red: #dc2626;
            --red-dim: rgba(220, 38, 38, 0.15);
            --red-glow: rgba(220, 38, 38, 0.4);
            --white: #ffffff;
            --green: #16a34a;
            --green-dim: rgba(22, 163, 74, 0.15);
            --gold: #f59e0b;
            --gold-dim: rgba(245, 158, 11, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #111111 50%, #0a0a0a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .logo-section {
            text-align: center;
            padding: 30px 0 20px;
        }
        .logo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.3);
            position: relative;
            overflow: hidden;
        }
        .logo-badge::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(100%) translateY(100%); }
        }
        .logo-badge span {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            z-index: 1;
        }
        .brand-name {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #ffffff, #dc2626, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }
        .brand-tagline {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 8px;
        }
        
        .app-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            justify-content: center;
        }
        .app-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 14px 32px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-tab:hover { color: var(--text); }
        .app-tab.active {
            color: var(--red);
            border-bottom-color: var(--red);
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }
        
        .app-panel { display: none; }
        .app-panel.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        @media (max-width: 700px) { .calc-grid { grid-template-columns: 1fr; } }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .card:hover {
            border-color: rgba(220, 38, 38, 0.3);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.05);
        }
        .card-title {
            color: var(--red);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group.full { grid-column: 1 / -1; }
        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, select, textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 14px;
            color: #f5f5f5;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        }
        textarea { resize: vertical; min-height: 80px; }
        
        .risk-slider {
            width: 100%;
            margin: 10px 0;
            accent-color: var(--red);
        }
        .risk-value {
            text-align: center;
            color: var(--red);
            font-weight: 900;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.3);
        }
        .presets {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .preset-btn {
            flex: 1;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-weight: 600;
        }
        .preset-btn:hover { background: #222; border-color: var(--red); color: var(--red); }
        .preset-btn.active {
            background: var(--red);
            color: white;
            font-weight: 700;
            border-color: var(--red);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.4);
        }
        
        .result-big {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .result-big::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
        }
        .result-label { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .result-number {
            color: white;
            font-size: 2.5rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
        }
        .result-unit { color: var(--text-muted); font-size: 0.9rem; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            transition: all 0.2s;
        }
        .stat-box:hover { border-color: rgba(220, 38, 38, 0.3); }
        .stat-label { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value {
            color: #f5f5f5;
            font-size: 1.1rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .stat-value.red { color: var(--red); text-shadow: 0 0 10px rgba(220, 38, 38, 0.3); }
        .stat-value.green { color: var(--green); }
        .stat-value.amber { color: var(--gold); }
        .stat-value.cyan { color: #ef4444; }
        
        .risk-bar-container { margin-top: 16px; }
        .risk-bar-bg {
            height: 8px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
        }
        .risk-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.4s ease;
            background: linear-gradient(90deg, var(--green), var(--gold), var(--red));
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.2);
        }
        .risk-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #555;
            margin-top: 4px;
        }
        
        .lot-breakdown {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 16px;
        }
        .lot-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        .lot-row:last-child { border-bottom: none; }
        .lot-name { color: #888; font-size: 0.85rem; }
        .lot-val { color: #f5f5f5; font-weight: 700; font-variant-numeric: tabular-nums; }
        
        .hidden { display: none !important; }
        .hint {
            font-size: 0.75rem;
            color: #555;
            margin-top: 6px;
            line-height: 1.4;
        }
        
        .journal-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .journal-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 24px;
            cursor: pointer;
            font-size: 0.95rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            font-weight: 600;
        }
        .journal-tab:hover { color: var(--text); }
        .journal-tab.active {
            color: var(--red);
            border-bottom-color: var(--red);
            background: var(--red-dim);
        }
        .journal-panel { display: none; }
        .journal-panel.active { display: block; animation: fadeIn 0.3s; }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--red), #991b1b);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }
        .btn-primary:hover { 
            opacity: 0.9; 
            transform: translateY(-1px); 
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
        }
        .btn-success { background: var(--green); color: #fff; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--red); color: var(--red); }
        
        .journal-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .journal-stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
        }
        .journal-stat-box:hover {
            border-color: rgba(220, 38, 38, 0.3);
            transform: translateY(-2px);
        }
        .journal-stat-box .value {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 8px 0;
        }
        .journal-stat-box .label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .journal-stat-box.green { border-color: rgba(22, 163, 74, 0.3); }
        .journal-stat-box.green .value { color: var(--green); }
        .journal-stat-box.red { border-color: rgba(220, 38, 38, 0.3); }
        .journal-stat-box.red .value { color: var(--red); text-shadow: 0 0 10px rgba(220, 38, 38, 0.3); }
        .journal-stat-box.blue { border-color: rgba(220, 38, 38, 0.3); }
        .journal-stat-box.blue .value { color: var(--red); }
        .journal-stat-box.gold { border-color: rgba(245, 158, 11, 0.3); }
        .journal-stat-box.gold .value { color: var(--gold); }
        
        .trade-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .trade-table th {
            text-align: left;
            padding: 12px;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
        }
        .trade-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .trade-table tr:hover td { background: rgba(220, 38, 38, 0.05); }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-buy { background: var(--green-dim); color: var(--green); }
        .badge-sell { background: var(--red-dim); color: var(--red); }
        .badge-win { background: var(--green-dim); color: var(--green); }
        .badge-loss { background: var(--red-dim); color: var(--red); }
        .badge-pending { background: rgba(220, 38, 38, 0.15); color: var(--red); }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        
        .trade-detail {
            display: none;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 16px;
            margin-top: 8px;
            grid-column: 1 / -1;
            border: 1px solid var(--border);
        }
        .trade-detail.show { display: block; }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .detail-item { font-size: 0.85rem; }
        .detail-item strong { color: var(--text-muted); display: block; font-size: 0.75rem; margin-bottom: 2px; text-transform: uppercase; }
        
        .mood-rating {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mood-option {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            background: var(--bg-input);
            color: #888;
        }
        .mood-option:hover { border-color: var(--red); color: var(--red); }
        .mood-option.selected {
            border-color: var(--red);
            background: var(--red-dim);
            color: var(--red);
            font-weight: 700;
        }
        
        .checklist { display: flex; flex-direction: column; gap: 10px; }
        .check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: var(--bg-input);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .check-item:hover { border-color: var(--red); }
        .check-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--red);
        }
        .check-item.checked { opacity: 0.5; text-decoration: line-through; }
        
        .week-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .day-box {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            min-height: 80px;
            transition: all 0.2s;
        }
        .day-box:hover { border-color: rgba(220, 38, 38, 0.3); }
        .day-box .day-name { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .day-box .day-num { font-size: 1.2rem; font-weight: 900; margin: 4px 0; }
        .day-box .pnl { font-size: 0.8rem; font-weight: 700; }
        .day-box .pnl.pos { color: var(--green); }
        .day-box .pnl.neg { color: var(--red); text-shadow: 0 0 5px rgba(220, 38, 38, 0.3); }
        .day-box.has-trade { border-color: var(--red); box-shadow: 0 0 10px rgba(220, 38, 38, 0.1); }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        
        footer {
            text-align: center;
            color: #333;
            font-size: 0.8rem;
            margin-top: 30px;
            padding-bottom: 20px;
        }
        
        #account-setup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        #account-setup .setup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(220, 38, 38, 0.1);
            position: relative;
            overflow: hidden;
        }
        #account-setup .setup-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
        }
        #account-setup .setup-logo { font-size: 3rem; margin-bottom: 16px; }
        #account-setup h2 { font-size: 1.4rem; margin-bottom: 8px; color: var(--text); }
        #account-setup p { color: var(--text-muted); margin-bottom: 24px; font-size: 0.9rem; }
        #account-setup .quick-balance-btn {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-weight: 600;
        }
        #account-setup .quick-balance-btn:hover { border-color: var(--red); color: var(--red); }
        #account-setup .quick-balance-btn.active {
            background: var(--red);
            color: white;
            border-color: var(--red);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.4);
        }
        #account-setup .start-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--red), #991b1b);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }
        #account-setup .start-btn:hover {
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.5);
            transform: translateY(-1px);
        }
        
        @media (max-width: 768px) {
            .week-calendar { grid-template-columns: repeat(4, 1fr); }
            .form-grid { grid-template-columns: 1fr; }
            .journal-stats-grid { grid-template-columns: repeat(2, 1fr); }
            .brand-name { font-size: 1.8rem; }
            .app-tab { padding: 10px 20px; font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            .week-calendar { grid-template-columns: repeat(2, 1fr); }
            .journal-stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Header -->
        <div class="logo-section">
            <div class="logo-badge"><span>4</span></div>
            <h1 class="brand-name">4USTRAIDERS</h1>
            <p class="brand-tagline">Forex Trading Suite</p>
        </div>
